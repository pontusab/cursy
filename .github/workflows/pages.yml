name: pages

# Deploy the static site in site/ to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/install.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -R site/. _site/
          # Serve the installer at https://cursy.dev/install so the homepage's
          # `curl … cursy.dev/install` command works from a single source.
          cp scripts/install.sh _site/install

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
