<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cursy — Cursor from iMessage</title>
<meta name="description" content="Text your own number. A small daemon on your Mac runs the prompt through cursor-agent and texts the result back. Local only." />
<meta name="theme-color" content="#0c1330" />
<meta property="og:title" content="cursy — Cursor from iMessage" />
<meta property="og:description" content="Text your own number; a local daemon routes it to cursor-agent and texts the result back." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://cursy.dev" />
<meta property="og:image" content="https://cursy.dev/img/og.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:image" content="https://cursy.dev/img/og.jpg" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='38' fill='none' stroke='%23f4f1e8' stroke-width='5'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Newsreader:opsz,wght@6..72,300;6..72,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #f5f2ea;
    --soft: rgba(245, 242, 234, 0.66);
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --serif: "Newsreader", Georgia, "Times New Roman", serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --glow: 0 1px 2px rgba(0,0,0,0.5), 0 2px 30px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    min-height: 100vh;
    font-family: var(--sans);
    color: var(--cream);
    background: #0c1330 url("img/bg.jpg") center center / cover no-repeat fixed;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 22px;
  }
  /* Soft scrim: darken just enough for legible text, keep the color */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(105% 80% at 50% 46%, rgba(6,10,28,0.18) 0%, rgba(6,10,28,0.46) 58%, rgba(4,7,20,0.66) 100%);
    pointer-events: none;
  }

  .stage { position: relative; max-width: 540px; }

  .brand {
    font-size: 13px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--soft);
    text-shadow: var(--glow);
  }

  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(40px, 8vw, 60px);
    line-height: 1.08;
    letter-spacing: -0.015em;
    margin: 26px 0 38px;
    text-shadow: var(--glow);
  }

  .cmd {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(8, 12, 28, 0.34);
    backdrop-filter: blur(10px) saturate(120%);
    -webkit-backdrop-filter: blur(10px) saturate(120%);
    border: 1px solid rgba(245, 242, 234, 0.18);
    border-radius: 13px;
    padding: 12px 12px 12px 16px;
    font-family: var(--mono);
    font-size: 13px;
    box-shadow: 0 10px 40px -12px rgba(0,0,0,0.5);
  }
  .cmd .sigil { color: var(--soft); user-select: none; }
  .cmd code { white-space: nowrap; color: var(--cream); }
  .cmd button {
    flex-shrink: 0;
    background: var(--cream);
    color: #14182b;
    border: 0;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity .15s;
  }
  .cmd button:hover { opacity: 0.85; }

  .footer {
    position: fixed;
    left: 18px;
    right: 18px;
    bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  .links {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12.5px;
    color: rgba(245, 242, 234, 0.92);
  }
  .links a { color: rgba(245, 242, 234, 0.92); text-decoration: none; transition: color .15s; }
  .links a:hover { color: var(--cream); }
  .links .sep { width: 3px; height: 3px; border-radius: 50%; background: rgba(245, 242, 234, 0.92); }

  .credit {
    font-size: 10.5px;
    letter-spacing: 0.02em;
    color: rgba(245, 242, 234, 0.82);
  }
  @media (max-width: 480px) {
    .cmd { font-size: 11.5px; }
    .credit { display: none; }
    .footer { justify-content: center; }
  }
</style>
</head>
<body>
  <main class="stage">
    <h1>Cursor,<br />from iMessage.</h1>

    <div class="cmd">
      <span class="sigil">$</span>
      <code id="cmd">curl -fsSL https://cursy.dev/install | bash</code>
      <button id="copy" aria-label="Copy install command">Copy</button>
    </div>
  </main>

  <footer class="footer">
    <div class="credit">Vincent van Gogh, <em>Starry Night Over the Rhône</em>, 1888</div>
    <nav class="links">
      <a href="https://github.com/pontusab/cursy">GitHub</a>
      <span class="sep"></span>
      <a href="https://x.com/pontusab">Twitter</a>
    </nav>
  </footer>

  <script>
    const btn = document.getElementById("copy");
    btn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(document.getElementById("cmd").textContent.trim());
        btn.textContent = "Copied";
        setTimeout(() => (btn.textContent = "Copy"), 1500);
      } catch {
        btn.textContent = "⌘C";
      }
    });
  </script>
</body>
</html>
